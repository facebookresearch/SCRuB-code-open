# SCRuBEval judge model configurations
#
# Each entry defines a named model that can be used as a judge in the ensemble.
# Select one with --judge <name> when running score_responses.py.
#
# Required fields per model:
#   model_id    : the model identifier string passed to the API
#   base_url    : chat completions endpoint (must accept OpenAI-compatible requests)
#   api_key_env : name of the environment variable holding your API key
#   token_param : "max_tokens" or "max_completion_tokens" (varies by provider)
#
# Any provider that exposes an OpenAI-compatible chat completions endpoint works,
# including cloud APIs (OpenAI, Anthropic, Google, Mistral, Cohere, etc.) and
# self-hosted models via vLLM, Ollama, llama.cpp, or LiteLLM.

models:

  # ── Cloud providers ──────────────────────────────────────────────────────────

  gpt-4o-mini:
    model_id:    "gpt-4o-mini"
    base_url:    "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    token_param: "max_completion_tokens"

